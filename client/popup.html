<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TrustScreen</title>
  <style>
    :root {
      --bg: #f1efe8;
      --panel: #fbfaf6;
      --panel-alt: #f5f2e8;
      --text: #111111;
      --muted: #5c5c5c;
      --border: #111111;
      --primary-color: #111111;
      --primary-hover: #2a2a2a;
      --success-color: #1f7a1f;
      --warning-color: #9a6a00;
      --danger-color: #9b1c1c;
      --info-color: #1b5f8c;
      --grid: rgba(17, 17, 17, 0.08);
      --shadow: 6px 6px 0 0 rgba(17, 17, 17, 0.16);
      --font-main: "IBM Plex Mono", "Cascadia Code", "SFMono-Regular", "Consolas", monospace;
    }

    body {
      width: 560px;
      min-height: 440px;
      padding: 18px;
      margin: 0;
      font-family: var(--font-main);
      background:
        linear-gradient(var(--grid) 1px, transparent 1px),
        linear-gradient(90deg, var(--grid) 1px, transparent 1px),
        var(--bg);
      background-size: 18px 18px, 18px 18px, auto;
      color: var(--text);
      box-sizing: border-box;
      font-size: 14px;
      line-height: 1.45;
      position: relative;
    }

    body.dark-theme {
      --bg: #111111;
      --panel: #171717;
      --panel-alt: #1d1d1d;
      --text: #f3f1e8;
      --muted: #b9b5aa;
      --border: #f3f1e8;
      --primary-color: #f3f1e8;
      --primary-hover: #d9d4c7;
      --success-color: #72d572;
      --warning-color: #f0be57;
      --danger-color: #ff8f8f;
      --info-color: #8ecfff;
      --grid: rgba(243, 241, 232, 0.1);
      --shadow: 6px 6px 0 0 rgba(0, 0, 0, 0.4);
    }

    * {
      box-sizing: border-box;
    }

    .app-shell {
      border: 2px solid var(--border);
      background: var(--panel);
      box-shadow: var(--shadow);
      padding: 14px;
    }

    .hero {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 14px;
      padding-bottom: 12px;
      border-bottom: 2px solid var(--border);
    }

    .hero-title {
      margin: 0;
      font-size: 24px;
      line-height: 1;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .hero-subtitle {
      margin: 6px 0 0;
      color: var(--muted);
      text-transform: uppercase;
      font-size: 12px;
      letter-spacing: 0.08em;
    }

    .top-bar {
      display: flex;
      justify-content: flex-end;
      position: relative;
      z-index: 5;
    }

    .settings-toggle {
      width: auto;
      margin: 0;
      padding: 10px 12px;
      border-radius: 0;
      font-size: 12px;
      font-weight: 700;
      border: 2px solid var(--border);
      background: var(--panel-alt);
      color: var(--text);
      cursor: pointer;
      text-transform: uppercase;
      font-family: inherit;
    }

    .settings-toggle:hover {
      background: var(--primary-color);
      color: var(--panel);
    }

    .settings-panel {
      position: absolute;
      right: 0;
      top: 48px;
      width: 280px;
      background: var(--panel);
      border: 2px solid var(--border);
      box-shadow: var(--shadow);
      padding: 12px;
    }

    .settings-title {
      margin: 0 0 10px;
      font-size: 12px;
      font-weight: 700;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .setting-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 10px;
      font-size: 13px;
      padding: 10px;
      border: 1px solid var(--border);
      background: var(--panel-alt);
    }

    .setting-item:last-child {
      margin-bottom: 0;
    }

    .section {
      margin-bottom: 14px;
      padding: 12px;
      border: 2px solid var(--border);
      background: var(--panel-alt);
    }

    .section-title {
      margin: 0 0 10px;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
    }

    .input-label {
      display: block;
      font-weight: 600;
      margin-bottom: 8px;
      color: var(--text);
      text-transform: uppercase;
      font-size: 12px;
      letter-spacing: 0.06em;
    }

    #url-input {
      width: 100%;
      padding: 12px;
      margin-bottom: 12px;
      border: 2px solid var(--border);
      border-radius: 0;
      font-size: 14px;
      background: var(--panel);
      color: var(--text);
      font-family: inherit;
      outline: none;
    }

    #check {
      width: 100%;
      padding: 14px;
      border: 2px solid var(--border);
      border-radius: 0;
      background-color: var(--primary-color);
      color: var(--panel);
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      transition: background-color 0.15s ease, color 0.15s ease;
      text-transform: uppercase;
      font-family: inherit;
    }

    #check:hover {
      background-color: var(--primary-hover);
    }

    #status {
      font-size: 13px;
      color: var(--text);
      margin-top: 0;
      margin-bottom: 14px;
      padding: 12px;
      background-color: var(--panel-alt);
      border: 2px solid var(--border);
      text-transform: uppercase;
    }

    #result-container {
      display: none;
      overflow: hidden;
      box-shadow: var(--shadow);
      border: 2px solid var(--border);
      background-color: var(--panel);
    }

    #result-header {
      background-color: var(--panel-alt);
      padding: 12px;
      font-size: 14px;
      font-weight: 700;
      color: var(--text);
      border-bottom: 2px solid var(--border);
      display: flex;
      align-items: center;
      gap: 12px;
      text-transform: uppercase;
    }

    .verdict-icon {
      font-size: 18px;
      width: 24px;
      text-align: center;
    }

    .verdict-safe { color: var(--success-color); }
    .verdict-phishing { color: var(--danger-color); }
    .verdict-suspicious { color: var(--warning-color); }
    .verdict-info { color: var(--info-color); }

    #result-content {
      padding: 14px;
    }

    .result-row {
      margin-bottom: 10px;
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      padding: 10px;
      border: 1px solid var(--border);
      background: var(--panel-alt);
    }

    .result-label {
      font-weight: 600;
      min-width: 110px;
      color: var(--muted);
      text-transform: uppercase;
      font-size: 12px;
    }

    .result-value {
      flex-grow: 1;
      word-break: break-word;
      font-size: 13px;
    }

    .score-bar-container {
      width: 100%;
      background-color: var(--panel);
      border: 1px solid var(--border);
      height: 14px;
      margin: 0;
      overflow: hidden;
    }

    .score-bar {
      height: 100%;
      background-color: var(--success-color);
      transition: width 0.5s ease-in-out;
    }

    .score-bar-phishing { background-color: var(--danger-color); }
    .score-bar-suspicious { background-color: var(--warning-color); }

    .reasons-list {
      list-style: none;
      padding-left: 0;
      margin: 0;
    }

    .reasons-list li {
      margin-bottom: 8px;
      padding: 8px 10px;
      border: 1px solid var(--border);
      background: var(--panel);
    }

    .reasons-list li::before {
      content: "> ";
      color: var(--muted);
    }

    input[type="checkbox"] {
      width: 16px;
      height: 16px;
      accent-color: var(--primary-color);
    }

    ::placeholder {
      color: var(--muted);
      opacity: 1;
    }
  </style>
</head>
<body>
  <div class="app-shell">
    <div class="hero">
      <div>
        <h1 class="hero-title">TrustScreen</h1>
        <p class="hero-subtitle">URL Scanner Terminal View</p>
      </div>
      <div class="top-bar">
        <button id="settings-toggle" class="settings-toggle" type="button">Настройки</button>
        <div id="settings-panel" class="settings-panel" hidden>
          <p class="settings-title">Параметры</p>
          <label class="setting-item" for="theme-toggle">
            <span>Тёмная тема</span>
            <input id="theme-toggle" type="checkbox" />
          </label>
          <label class="setting-item" for="realtime-toggle">
            <span>Проверка в реальном времени</span>
            <input id="realtime-toggle" type="checkbox" />
          </label>
        </div>
      </div>
    </div>

    <section class="section">
      <p class="section-title">Manual Check</p>
      <label class="input-label" for="url-input">URL для проверки</label>
      <input id="url-input" type="text" placeholder="https://example.com" />
      <button id="check">Проверить URL</button>
    </section>

    <div id="status">[ standby ] ожидание данных...</div>

    <div id="result-container">
      <div id="result-header">
        <span id="verdict-icon" class="verdict-icon">i</span>
        <span id="verdict-text">Результат проверки</span>
      </div>
      <div id="result-content"></div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
